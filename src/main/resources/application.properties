# 1. Configuración de conexión a la base de datos (Dinámica: Nube o Local)
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/krama_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}

# 2. Configuración de JPA y Hibernate (La magia de los datos)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

